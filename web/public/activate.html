<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Activate ReeLabs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="/" class="nav-logo">Ree<span>Labs</span></a>
    </nav>

    <main>
      <div class="container" style="max-width: 520px">
        <h1 style="font-size: 32px">Activate ReeLabs</h1>
        <p class="subtitle" style="font-size: 16px">
          Sign in and confirm the code shown in Claude to connect this device.
        </p>

        <div id="form" class="card">
          <label
            for="code-input"
            style="display: block; font-size: 13px; color: var(--cream-dim); margin-bottom: 8px"
            >Activation code</label
          >
          <input
            id="code-input"
            type="text"
            placeholder="ABCD-1234"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            style="
              width: 100%;
              padding: 14px 16px;
              background: var(--surface-2);
              border: 1px solid var(--border);
              border-radius: 10px;
              color: var(--cream);
              font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
              font-size: 18px;
              font-weight: 600;
              letter-spacing: 0.12em;
              text-transform: uppercase;
              margin-bottom: 20px;
            "
          />

          <div id="user-info" style="display: none; align-items: center; gap: 12px; margin-bottom: 16px">
            <span style="color: var(--cream-dim); font-size: 14px">Signed in as</span>
            <span id="user-email" style="font-size: 14px; font-weight: 600"></span>
          </div>

          <div style="display: flex; gap: 10px">
            <button id="sign-in-btn" class="btn btn-primary" style="flex: 1">
              <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path
                  fill="#fff"
                  d="M44.5 20H24v8.5h11.8C34.7 33.9 30 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"
                />
              </svg>
              Sign in with Google
            </button>
            <button id="activate-btn" class="btn btn-primary" style="flex: 1" disabled>
              Connect device
            </button>
          </div>

          <div id="status" class="status"></div>
        </div>

        <div id="success" class="card" style="display: none; text-align: center">
          <div style="font-size: 32px; margin-bottom: 12px">✓</div>
          <h2 style="margin: 0 0 8px">Device connected</h2>
          <p style="color: var(--cream-dim); margin: 0 0 20px">
            Return to Claude and retry your request.
          </p>
        </div>
      </div>
    </main>

    <footer class="footer">ReeLabs · reelabs.ai</footer>

    <script type="module" src="/assets/activate.js"></script>
  </body>
</html>
